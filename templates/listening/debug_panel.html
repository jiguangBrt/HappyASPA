<!-- 调试面板：显示服务器端存储的进度信息，仅用于测试 -->
<div class="debug-info small text-muted mt-1" data-exercise-id="{{ exercise_id }}">加载中...</div>

<script>
(function() {
    // 确保只初始化一次
    if (window._listeningDebugInitialized) return;
    window._listeningDebugInitialized = true;

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.debug-info').forEach(el => {
            const exerciseId = el.dataset.exerciseId;
            fetch(`/listening/progress/${exerciseId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.exists) {
                        el.innerHTML = `
                            📍 最后位置: ${data.last_position?.toFixed(1) || 0}s |
                            🔁 2/3次数: ${data.two_thirds_count || 0} |
                            📝 答题: ${data.answers ? Object.keys(data.answers).length : 0}题 |
                            ✅ 完成: ${data.completed ? '是' : '否'}
                        `;
                    } else {
                        el.innerHTML = '⏳ 无进度记录';
                    }
                })
                .catch(err => {
                    el.innerHTML = '❌ 加载失败';
                    console.error(err);
                });
        });
    });
})();
</script>
