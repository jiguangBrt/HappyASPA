{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="text-center mb-4">
      <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2">Create an Account</h2>
      <p class="text-muted">Start your academic English journey today</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="Choose a username" required autofocus>
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Create a password" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirm" class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="confirm" name="confirm"
                     placeholder="Repeat your password" required>
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-person-check me-1"></i>Create Account
            </button>
          </div>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Log in</a>
    </p>

  </div>
</div>
{% endblock %}
